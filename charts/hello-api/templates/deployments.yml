apiVersion: apps/v1
kind: Deployment
metadata:
  name: { ? { include "hello-api.fullname" . } }
  labels:
    app.kubernetes.io/name: { ? { include "hello-api.name" . } }
spec:
  replicas: { ? { .Values.replicaCount } }
  selector:
    matchLabels:
      app.kubernetes.io/name: { ? { include "hello-api.name" . } }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: { ? { include "hello-api.name" . } }
    spec:
      containers:
      - name: hello
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: { ? { .Values.image.pullPolicy } }
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        resources: { ? { toYaml .Values.resources | nindent 12 } }
